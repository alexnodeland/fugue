[book]
authors = ["Alex Nodeland"]
language = "en"
src = "src"
title = "Fugue Docs"
multilingual = false
text-direction = "ltr"

[build]
create-missing = true

[output.html]
# "navy" is mdbook's dark theme; the previous value "dark" is not a real
# mdbook theme name, so light-OS visitors silently got the light CSS fallback
# while the html class still claimed dark.
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/alexnodeland/fugue"
site-url = "/"
additional-css = ["./mdbook-admonish.css", "fugue-theme.css", "fugue-viz.css"]
additional-js = ["mermaid.min.js", "mermaid-init.js", "fugue-brand.js", "fugue-viz.js", "fugue-wasm-loader.js", "viz/anatomy.js", "viz/monad.js", "viz/metropolis.js", "viz/hmc.js", "viz/smc.js", "viz/distributions.js", "viz/inline.js", "viz/minis.js", "viz/playground.js"]

[output.html.fold]
enable = true
level = 0

[output.html.print]
enable = true
page-break = true

# Linkcheck disabled due to issues with LaTeX math syntax
# [output.linkcheck]
# follow-web-links = false
# traverse-parent-directories = true
# warning-policy = "warn"

[preprocessor.admonish]
command = "mdbook-admonish"
assets_version = "3.1.0" # do not edit: managed by `mdbook-admonish install`

[preprocessor.mermaid]
command = "mdbook-mermaid"

[preprocessor.katex]
after = ["links"]

[preprocessor.toc]
command = "mdbook-toc"
renderer = ["html"]
